<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Real-Time Chat Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Segoe UI',Verdana,sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);padding:20px;}
    .login-container{width:100%;max-width:420px;}
    .login-card{background:white;padding:40px 35px;border-radius:20px;box-shadow:0 12px 30px rgba(0,0,0,0.2);animation:fadeIn 0.5s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    h2{text-align:center;font-weight:700;color:#222;margin-bottom:10px;}
    .subtitle{text-align:center;color:#666;font-size:14px;margin-bottom:30px;}
    .form-control{height:50px;border-radius:12px;border:1px solid #dcdcdc;padding-left:15px;font-size:15px;transition:0.3s;}
    .form-control:focus{border-color:#2a5298;box-shadow:0 0 0 0.15rem rgba(42,82,152,0.2);}
    .btn-login{width:100%;height:50px;border:none;border-radius:12px;background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;font-size:16px;font-weight:600;transition:0.3s;}
    .btn-login:hover{transform:translateY(-2px);opacity:0.95;}
    #msg{margin-top:15px;text-align:center;font-size:14px;font-weight:500;}
    .register-text{margin-top:22px;text-align:center;color:#666;font-size:14px;}
    .register-text a{color:#2a5298;text-decoration:none;font-weight:600;}
    .register-text a:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Login to continue chatting in real time</p>
      <form id="loginForm">
        <div class="mb-3"><input id="name" class="form-control" placeholder="Enter Username" required /></div>
        <div class="mb-3"><input id="password" type="password" class="form-control" placeholder="Enter Password" required /></div>
        <button class="btn-login" type="submit">Login</button>
        <p id="msg"></p>
        <p class="register-text">Don’t have an account? <a href="register.html">Register</a></p>
      </form>
    </div>
  </div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('name').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  msg.innerText = '';
  try {
    const res = await fetch('/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const json = await res.json();
    if (!res.ok) {
      msg.style.color = 'red';
      msg.innerText = json.message || 'Login failed';
      return;
    }
    localStorage.setItem('token', json.token);
    localStorage.setItem('username', username);
    msg.style.color = 'green';
    msg.innerText = 'Login successful';
    setTimeout(() => { location.href = 'chat.html'; }, 700);
  } catch (err) {
    msg.style.color = 'red';
    msg.innerText = 'Network error';
  }
});
</script>
</body>
</html>
