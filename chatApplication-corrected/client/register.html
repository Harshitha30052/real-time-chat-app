<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Segoe UI',Verdana,sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);padding:20px;}
    .register-container{width:100%;max-width:450px;}
    .register-card{background:white;padding:40px 35px;border-radius:20px;box-shadow:0 12px 30px rgba(0,0,0,0.2);animation:fadeIn 0.5s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    h2{text-align:center;font-weight:700;color:#222;margin-bottom:10px;}
    .subtitle{text-align:center;color:#666;font-size:14px;margin-bottom:30px;}
    .form-control{height:50px;border-radius:12px;border:1px solid #dcdcdc;padding-left:15px;font-size:15px;transition:0.3s;}
    .form-control:focus{border-color:#2a5298;box-shadow:0 0 0 0.15rem rgba(42,82,152,0.2);}
    .btn-register{width:100%;height:50px;border:none;border-radius:12px;background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;font-size:16px;font-weight:600;transition:0.3s;}
    .btn-register:hover{transform:translateY(-2px);opacity:0.95;}
    #msg{margin-top:15px;text-align:center;font-size:14px;font-weight:500;}
    .login-text{margin-top:22px;text-align:center;color:#666;font-size:14px;}
    .login-text a{color:#2a5298;text-decoration:none;font-weight:600;}
    .login-text a:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-card">
      <h2>Create Account</h2>
      <p class="subtitle">Register to start chatting in real time</p>
      <form id="regForm">
        <div class="mb-3"><input id="name" class="form-control" placeholder="Enter Username" required /></div>
        <div class="mb-3"><input id="email" type="email" class="form-control" placeholder="Enter Email" required /></div>
        <div class="mb-3"><input id="password" type="password" class="form-control" placeholder="Enter Password" required /></div>
        <div class="mb-3"><input id="confirm" type="password" class="form-control" placeholder="Confirm Password" required /></div>
        <button class="btn-register" type="submit">Register</button>
        <p id="msg"></p>
        <p class="login-text">Already have an account? <a href="login.html">Login</a></p>
      </form>
    </div>
  </div>
<script>
document.getElementById('regForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const msg = document.getElementById('msg');
  msg.innerText = '';
  if (password !== confirm) {
    msg.style.color = 'red';
    msg.innerText = 'Passwords do not match';
    return;
  }
  try {
    const res = await fetch('/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username: name, email, password })
    });
    const text = await res.text();
    msg.style.color = res.ok ? 'green' : 'red';
    msg.innerText = text;
    if (res.ok) setTimeout(() => location.href = 'login.html', 1200);
  } catch (err) {
    msg.style.color = 'red';
    msg.innerText = 'Network error';
  }
});
</script>
</body>
</html>
