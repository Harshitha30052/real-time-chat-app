<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat Application</title>

<script src="/socket.io/socket.io.js"></script>

<script type="module">
  import "https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js";
</script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#eef2f7;
    height:100vh;
    overflow:hidden;
}

/* ================= WELCOME SCREEN ================= */

#welcomeScreen{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.welcome-box{
    background:#fff;
    padding:40px 35px;
    border-radius:20px;
    width:380px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

.welcome-box h2{
    margin-bottom:25px;
    color:#1e3c72;
}

.welcome-box input,
.welcome-box select{
    width:100%;
    height:50px;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:15px;
}

.welcome-box input:focus,
.welcome-box select:focus{
    outline:none;
    border-color:#1877f2;
}

.btn{
    width:100%;
    padding:12px;
    background:#1877f2;
    color:white;
    margin-top:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
}

.btn:hover{
    opacity:0.95;
}

#joinBtn{
    background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* ================= CHAT CONTAINER ================= */

#chatContainer{
    display:none;
    height:100vh;
    width:100%;
    flex-direction:column;
}

/* ================= TOP BAR ================= */

#topBar{
    background:linear-gradient(135deg,#1877f2,#1456b8);
    color:white;
    height:65px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
}

#roomTitle{
    font-size:24px;
    font-weight:700;
}

#deleteChat{
    padding:10px 16px;
    font-size:14px;
    background:#ef233c;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
}

/* ================= CHAT BODY ================= */

#chatBody{
    display:flex;
    height:calc(100vh - 65px);
}

/* ================= SIDEBAR ================= */

#onlineUsers{
    width:260px;
    background:white;
    padding:20px;
    border-right:1px solid #ddd;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

#onlineUsers h3{
    font-size:28px;
    color:#1e3c72;
    margin-bottom:20px;
}

#userList{
    list-style:none;
}

#userList li{
    background:#f1f4fa;
    padding:14px;
    border-radius:12px;
    margin-bottom:12px;
    font-size:16px;
    font-weight:500;
}

#logoutBtn{
    padding:14px;
    font-size:16px;
    background:#d90429;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

/* ================= MESSAGE AREA ================= */

#messageArea{
    flex:1;
    display:flex;
    flex-direction:column;
    position:relative;
    background:#eef2f7;
}

#messages{
    flex:1;
    overflow-y:auto;
    padding:25px;
}

/* ================= MESSAGE BUBBLES ================= */

.msg{
    background:white;
    padding:14px 16px;
    margin:10px 0;
    border-radius:18px;
    max-width:60%;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    line-height:1.5;
    word-wrap:break-word;
}

.self{
    background:#1877f2;
    color:white;
    margin-left:auto;
}

.self b,
.self small{
    color:white;
}

.msg small{
    display:block;
    margin-top:5px;
    font-size:11px;
    opacity:0.7;
}

.dateTag{
    text-align:center;
    margin:15px 0;
    font-weight:600;
    color:#666;
}

/* ================= TYPING ================= */

#typing{
    height:20px;
    color:#555;
    margin-left:20px;
    margin-bottom:5px;
    font-size:14px;
}

/* ================= INPUT AREA ================= */

#inputArea{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px;
    background:white;
    border-top:1px solid #ddd;
}

#emojiBtn{
    width:50px;
    height:50px;
    border:none;
    border-radius:12px;
    background:#f1f4fa;
    font-size:22px;
    cursor:pointer;
}

#msgInput{
    flex:1;
    height:50px;
    border:none;
    outline:none;
    background:#f1f4fa;
    border-radius:14px;
    padding:0 18px;
    font-size:15px;
}

#sendBtn{
    width:90px;
    height:50px;
    border:none;
    border-radius:14px;
    background:#1d4ed8;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

/* ================= EMOJI PICKER ================= */

emoji-picker{
    position:absolute;
    bottom:85px;
    left:20px;
    display:none;
    z-index:1000;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){

    #onlineUsers{
        display:none;
    }

    .msg{
        max-width:85%;
    }

    #roomTitle{
        font-size:18px;
    }

}

</style>

</head>

<body>

<div id="welcomeScreen">

    <div class="welcome-box">

        <h2>Welcome to Chat</h2>

        <input type="text" id="username" placeholder="Enter username" />

        <select id="roomType">
            <option value="public">Public Room</option>
            <option value="private">Private Room</option>
        </select>

        <div id="secretKeyBox" style="display:none;">

            <input type="text" id="secretKey" placeholder="Enter Secret Key" />

            <button class="btn" id="generateKey">
                Generate Key
            </button>

            <button class="btn" id="copyKey">
                Copy Key
            </button>

        </div>

        <button class="btn" id="joinBtn">
            Join Chat
        </button>

    </div>

</div>

<div id="chatContainer">

    <div id="topBar">

        <span id="roomTitle">
            Chat Room
        </span>

        <button id="deleteChat">
            Delete Chat
        </button>

    </div>

    <div id="chatBody">

        <div id="onlineUsers">

            <div>

                <h3>Online Users</h3>

                <ul id="userList"></ul>

            </div>

            <button id="logoutBtn">
                Logout
            </button>

        </div>

        <div id="messageArea">

            <div id="messages"></div>

            <div id="typing"></div>

            <emoji-picker id="emojiPicker"></emoji-picker>

            <div id="inputArea">

                <button id="emojiBtn">
                    😊
                </button>

                <input
                    id="msgInput"
                    placeholder="Type your message..."
                />

                <button id="sendBtn">
                    Send
                </button>

            </div>

        </div>

    </div>

</div>

<script>

const socket = io();

let username = "";
let currentRoom = "";
let lastDateShown = "";

const welcomeScreen = document.getElementById("welcomeScreen");
const chatContainer = document.getElementById("chatContainer");
const joinBtn = document.getElementById("joinBtn");
const roomType = document.getElementById("roomType");
const secretKeyBox = document.getElementById("secretKeyBox");
const secretKeyInput = document.getElementById("secretKey");
const messagesEl = document.getElementById("messages");
const msgInput = document.getElementById("msgInput");
const typingEl = document.getElementById("typing");
const emojiPicker = document.getElementById("emojiPicker");
const emojiBtn = document.getElementById("emojiBtn");
const deleteChatBtn = document.getElementById("deleteChat");
const roomTitle = document.getElementById("roomTitle");
const sendBtn = document.getElementById("sendBtn");

roomType.onchange = () => {

    secretKeyBox.style.display =
    roomType.value === "private"
    ? "block"
    : "none";

};

document.getElementById("generateKey").onclick = () => {

    secretKeyInput.value =
    Math.random()
    .toString(36)
    .substr(2,6)
    .toUpperCase();

};

document.getElementById("copyKey").onclick = () => {

    secretKeyInput.select();
    document.execCommand("copy");

};

joinBtn.onclick = () => {

    username =
    document.getElementById("username")
    .value
    .trim();

    if (!username)
    return alert("Enter username first!");

    let key = secretKeyInput.value.trim();

    currentRoom =
    roomType.value === "private"
    ? "private_" + key
    : "Public";

    socket.emit("joinRoom", {
        room: currentRoom,
        username
    });

    roomTitle.innerText =
    "Room: " + currentRoom;

    messagesEl.innerHTML = "";
    lastDateShown = "";

    welcomeScreen.style.display = "none";
    chatContainer.style.display = "flex";

};

document.getElementById("logoutBtn").onclick = () => {

    if(!confirm("Are you sure you want to logout?"))
    return;

    localStorage.removeItem('username');

    window.location.href = "login.html";

};

sendBtn.onclick = sendMessage;

msgInput.onkeydown = (e) => {

    if(e.key==='Enter')
    sendMessage();

};

function sendMessage(){

    const text = msgInput.value.trim();

    if(!text || !currentRoom)
    return;

    socket.emit("chatMessage", {
        room: currentRoom,
        username,
        msg: text
    });

    msgInput.value = '';

}

msgInput.addEventListener("input", () => {

    socket.emit("typing", {
        room: currentRoom,
        username
    });

});

customElements.whenDefined('emoji-picker').then(()=>{

    emojiBtn.onclick = ()=> {

        emojiPicker.style.display =
        emojiPicker.style.display==='block'
        ? 'none'
        : 'block';

    };

    emojiPicker.addEventListener('emoji-click', e => {

        msgInput.value += e.detail.unicode;

        emojiPicker.style.display='none';

        msgInput.focus();

    });

});

deleteChatBtn.onclick = () => {

    if(!currentRoom) return;

    if(!confirm("Delete all chat messages for this room?"))
    return;

    socket.emit("deleteChat", currentRoom);

    messagesEl.innerHTML = '';

    lastDateShown='';

};

socket.on("loadOldMessages", rows => {

    rows.forEach(r =>
        appendMessage(
            r.username,
            r.message,
            r.timestamp
        )
    );

});

socket.on("message", data => {

    appendMessage(
        data.username,
        data.msg,
        data.timestamp
    );

});

socket.on("notification", text => {

    const n = document.createElement("div");

    n.className="dateTag";

    n.innerText = text;

    messagesEl.appendChild(n);

    messagesEl.scrollTop =
    messagesEl.scrollHeight;

});

socket.on("updateUsers", list => {

    const ul =
    document.getElementById("userList");

    ul.innerHTML = "";

    list.forEach(u => {

        const li =
        document.createElement("li");

        li.innerText = u;

        ul.appendChild(li);

    });

});

socket.on("showTyping", user => {

    typingEl.innerText =
    user + " is typing...";

    setTimeout(() =>
        typingEl.innerText='',
        2000
    );

});

function appendMessage(sender, msg, time){

    const date = new Date(time);

    const today = new Date();

    const dateLabel =
    date.toDateString() === today.toDateString()
    ? "Today"
    : date.toDateString();

    if(dateLabel !== lastDateShown){

        const d =
        document.createElement("div");

        d.className="dateTag";

        d.innerText=dateLabel;

        messagesEl.appendChild(d);

        lastDateShown=dateLabel;

    }

    const el =
    document.createElement("div");

    el.className =
    "msg " +
    (sender===username ? "self" : "");

    el.innerHTML =
    `<b>${sender}</b>: ${msg}
    <br>
    <small>
        ${date.toLocaleTimeString()}
    </small>`;

    messagesEl.appendChild(el);

    messagesEl.scrollTop =
    messagesEl.scrollHeight;

}

</script>

</body>
</html>
